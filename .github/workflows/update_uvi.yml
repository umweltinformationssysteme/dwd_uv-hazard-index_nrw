name: NRW UV Hazard Index

on:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC — after DWD publishes (~04:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libeccodes-dev \
            libgdal-dev \
            gdal-bin \
            libspatialindex-dev \
            fonts-dejavu-core

      - name: Install Python packages
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run forecast + map generation
        run: python fetch_uvi.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in output/uvi_forecast_nrw.json \
                   output/uvi_forecast_nrw.geojson \
                   output/uvi-map-nrw-today.jpg \
                   README.md; do
            [ -f "$f" ] && git add "$f" || echo "WARNING: $f not found"
          done
          if git diff --cached --quiet; then
            echo "No changes – nothing to commit."
          else
            git commit -m "chore: UV hazard index $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
